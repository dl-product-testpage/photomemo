<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>写真メモ</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif; background:#1a1a1a; color:#fff; min-height:100vh; display:flex; flex-direction:column; }
  header { padding:10px 14px; display:flex; align-items:center; justify-content:space-between; gap:8px; }
  header h1 { font-size:17px; font-weight:700; }
  .btn { border:none; border-radius:10px; padding:10px 16px; font-size:15px; font-weight:700; cursor:pointer; }
  .btn-primary { background:#e53935; color:#fff; }
  .btn-ghost { background:#333; color:#fff; }
  #stage { flex:1; display:flex; align-items:center; justify-content:center; padding:6px; overflow:hidden; }
  #canvas { max-width:100%; max-height:100%; border-radius:8px; touch-action:none; display:none; }
  #placeholder { text-align:center; color:#888; padding:40px 20px; }
  #placeholder .big { font-size:52px; margin-bottom:12px; }
  #placeholder button { margin-top:16px; }
  #commentWrap { padding:8px 12px; display:none; }
  #comment { width:100%; font-size:18px; font-weight:700; padding:12px; border-radius:10px; border:2px solid #444; background:#222; color:#fff; resize:none; }
  #comment::placeholder { color:#777; font-weight:400; }
  footer { display:none; padding:8px 12px 16px; gap:8px; }
  footer .btn { flex:1; padding:14px 0; font-size:16px; }
  input[type=file] { display:none; }
  #savedView { display:none; position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:10; flex-direction:column; align-items:center; justify-content:center; padding:16px; }
  #savedView img, #savedCanvas { max-width:100%; max-height:72vh; width:auto; height:auto; border-radius:8px; background:#111; }
  #savedImg { display:none; }
  #savedView p { margin:14px 0; font-size:15px; color:#ccc; text-align:center; }
</style>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#e53935">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="写真メモ">
<link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
<header>
  <h1>📷 写真メモ</h1>
  <button class="btn btn-ghost" id="newBtn" style="display:none">別の写真</button>
</header>

<div id="stage">
  <div id="placeholder">
    <div class="big">📸</div>
    <div>写真を選んで、指で線をひいて、<br>コメントを書くだけ。</div>
    <button class="btn btn-primary" id="pickBtn">写真を選ぶ</button>
  </div>
  <canvas id="canvas"></canvas>
</div>

<div id="commentWrap">
  <textarea id="comment" rows="2" placeholder="ここにコメントを書く…"></textarea>
</div>

<footer id="footer">
  <button class="btn btn-ghost" id="undoBtn">↩ 1つ戻す</button>
  <button class="btn btn-primary" id="saveBtn">💾 画像として保存</button>
</footer>

<input type="file" id="file" accept="image/*">

<div id="savedView">
  <canvas id="savedCanvas"></canvas>
  <img id="savedImg" alt="保存画像">
  <p>プレビューが表示されたら、下のボタンから保存してください。<br>画像を長押しできる環境では長押し保存も使えます。</p>
  <button class="btn btn-primary" id="shareSaved" style="margin-bottom:8px">共有 / 写真に保存</button>
  <button class="btn btn-ghost" id="closeSaved">閉じる</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const fileInput = document.getElementById('file');
let img = null;
let annotations = [];  // 確定済み {strokes:[...], text:""}
let curStrokes = [];   // 編集中の線（コメント未確定）
let current = null;    // 描画中の線
let lineW = 12;
const commentBox = () => document.getElementById('comment');

document.getElementById('pickBtn').onclick = () => fileInput.click();
document.getElementById('newBtn').onclick = () => fileInput.click();

fileInput.onchange = e => {
  const f = e.target.files[0];
  if (!f) return;
  const url = URL.createObjectURL(f);
  const im = new Image();
  im.onload = () => {
    img = im;
    annotations = [];
    curStrokes = [];
    commentBox().value = '';
    // 太め：画像幅の1.5%（最低12px）
    lineW = Math.max(12, Math.round(im.naturalWidth * 0.015));
    canvas.width = im.naturalWidth;
    canvas.height = im.naturalHeight;
    canvas.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('commentWrap').style.display = 'block';
    document.getElementById('footer').style.display = 'flex';
    document.getElementById('newBtn').style.display = 'inline-block';
    redraw();
    URL.revokeObjectURL(url);
  };
  im.src = url;
  e.target.value = '';
};

function pos(ev) {
  const r = canvas.getBoundingClientRect();
  return {
    x: (ev.clientX - r.left) * (canvas.width / r.width),
    y: (ev.clientY - r.top) * (canvas.height / r.height)
  };
}

canvas.addEventListener('pointerdown', ev => {
  if (!img) return;
  ev.preventDefault();
  canvas.setPointerCapture(ev.pointerId);
  // コメント入力済みの線があれば確定して固定。コメント欄はそのまま残す
  const text = commentBox().value.trim();
  if (text && curStrokes.length) {
    annotations.push({ strokes: curStrokes, text });
    curStrokes = [];
  }
  current = [pos(ev)];
});
canvas.addEventListener('pointermove', ev => {
  if (!current) return;
  ev.preventDefault();
  current.push(pos(ev));
  redraw();
});
function endStroke() {
  if (current && current.length > 1) curStrokes.push(current);
  current = null;
  redraw();
}
canvas.addEventListener('pointerup', endStroke);
canvas.addEventListener('pointercancel', endStroke);

function drawStroke(c, s, w) {
  c.strokeStyle = '#e53935';
  c.lineWidth = w;
  c.lineCap = 'round';
  c.lineJoin = 'round';
  c.beginPath();
  c.moveTo(s[0].x, s[0].y);
  for (let i = 1; i < s.length; i++) c.lineTo(s[i].x, s[i].y);
  c.stroke();
}

function wrapText(c, text, maxW) {
  const lines = [];
  for (const para of text.split('\n')) {
    let line = '';
    for (const ch of para) {
      if (c.measureText(line + ch).width > maxW && line) { lines.push(line); line = ch; }
      else line += ch;
    }
    lines.push(line);
  }
  return lines;
}

// 赤線の下に赤文字でコメントを描く（groupStrokes = その注釈の線たち）
function drawComment(c, groupStrokes, comment) {
  if (!comment || !groupStrokes.length) return;
  const W = canvas.width, H = canvas.height;
  const fontSize = Math.max(28, Math.round(W * 0.05));
  const lineHeight = Math.round(fontSize * 1.35);
  const pad = Math.round(fontSize * 0.5);

  // その注釈の最後の線の位置を基準にする
  const s = groupStrokes[groupStrokes.length - 1];
  let maxY = 0, minX = Infinity, maxX = 0;
  for (const p of s) { maxY = Math.max(maxY, p.y); minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x); }

  c.font = `bold ${fontSize}px -apple-system,"Hiragino Sans","Noto Sans JP",sans-serif`;
  c.textBaseline = 'top';
  const lines = wrapText(c, comment, W - pad * 2);

  // 線の下に置く。はみ出すなら線の上に
  let y = maxY + lineW / 2 + pad;
  if (y + lines.length * lineHeight > H - pad) {
    let minY = Infinity;
    for (const p of s) minY = Math.min(minY, p.y);
    y = Math.max(pad, minY - lineW / 2 - pad - lines.length * lineHeight);
  }
  // 線の中央あたりに寄せる（画像内に収める）
  const cx = (minX + maxX) / 2;

  for (let i = 0; i < lines.length; i++) {
    const tw = c.measureText(lines[i]).width;
    let x = cx - tw / 2;
    x = Math.max(pad, Math.min(x, W - pad - tw));
    // 白フチで読みやすく
    c.lineWidth = Math.max(4, Math.round(fontSize * 0.18));
    c.strokeStyle = '#ffffff';
    c.lineJoin = 'round';
    c.strokeText(lines[i], x, y + i * lineHeight);
    c.fillStyle = '#e53935';
    c.fillText(lines[i], x, y + i * lineHeight);
  }
}

function redraw() {
  ctx.drawImage(img, 0, 0);
  // 確定済みの注釈（線＋コメント）は固定表示
  for (const a of annotations) {
    for (const s of a.strokes) drawStroke(ctx, s, lineW);
    drawComment(ctx, a.strokes, a.text);
  }
  // 編集中の線＋入力中コメント
  for (const s of curStrokes) drawStroke(ctx, s, lineW);
  if (current && current.length > 1) drawStroke(ctx, current, lineW);
  drawComment(ctx, curStrokes, commentBox().value.trim());
}

document.getElementById('comment').addEventListener('input', () => { if (img) redraw(); });

document.getElementById('undoBtn').onclick = () => {
  if (curStrokes.length) {
    curStrokes.pop();
  } else if (annotations.length) {
    // 確定済みの最後の注釈を編集状態に戻す
    const a = annotations.pop();
    curStrokes = a.strokes;
    commentBox().value = a.text;
  }
  if (img) redraw();
};

// 保存：写真＋赤線＋赤文字コメントをそのまま1枚のPNGに
// iPhone PWAでは <img src=DataURL> の描画や自動共有のタイミングが不安定なことがあるため、
// まず保存用canvasを画面に表示し、ユーザー操作で共有/保存を開く。
let lastSavedFile = null;
let lastSavedDataUrl = '';
let lastSavedFilename = '';

document.getElementById('saveBtn').onclick = async () => {
  if (!img) return;
  redraw();

  const savedCanvas = document.getElementById('savedCanvas');
  const savedImg = document.getElementById('savedImg');
  const savedView = document.getElementById('savedView');
  const shareBtn = document.getElementById('shareSaved');
  const filename = 'photo-memo-' + Date.now() + '.png';

  try {
    // 画面表示は <img> ではなく canvas コピーにする。iPhone PWAで最も安定。
    savedCanvas.width = canvas.width;
    savedCanvas.height = canvas.height;
    savedCanvas.getContext('2d').drawImage(canvas, 0, 0);

    // 長押し保存が使えるブラウザ用のフォールバック画像も用意。
    lastSavedDataUrl = canvas.toDataURL('image/png');
    savedImg.src = lastSavedDataUrl;
    savedImg.style.display = 'none';

    lastSavedFilename = filename;
    lastSavedFile = null;

    if (canvas.toBlob) {
      canvas.toBlob((blob) => {
        if (!blob) return;
        lastSavedFile = new File([blob], filename, { type: 'image/png' });
      }, 'image/png');
    }

    savedView.style.display = 'flex';
    // iOSでDOM反映が遅れる場合があるため、1フレーム後にも再描画する。
    requestAnimationFrame(() => {
      savedCanvas.getContext('2d').drawImage(canvas, 0, 0);
    });

    shareBtn.textContent = (navigator.share ? '共有 / 写真に保存' : '画像を開く');
  } catch (e) {
    alert('画像の作成に失敗しました。写真サイズを少し小さくしてから再度お試しください。');
    console.error(e);
  }
};

document.getElementById('shareSaved').onclick = async () => {
  try {
    if (lastSavedFile && navigator.canShare && navigator.share && navigator.canShare({ files: [lastSavedFile] })) {
      await navigator.share({ files: [lastSavedFile], title: '写真メモ' });
      return;
    }
    // 共有APIがない場合は別タブで画像を開く。
    if (lastSavedDataUrl) {
      const w = window.open();
      if (w) {
        w.document.write('<!doctype html><meta name="viewport" content="width=device-width,initial-scale=1"><title>保存画像</title><img src="' + lastSavedDataUrl + '" style="width:100%;height:auto;">');
        w.document.close();
      } else {
        document.getElementById('savedImg').style.display = 'block';
        document.getElementById('savedCanvas').style.display = 'none';
      }
    }
  } catch (e) {
    // キャンセル時などはプレビューを残す
    console.log(e);
  }
};

document.getElementById('closeSaved').onclick = () => {
  document.getElementById('savedView').style.display = 'none';
};
</script>

<script>
if('serviceWorker' in navigator){
window.addEventListener('load',()=>navigator.serviceWorker.register('./service-worker.js'));
}
</script>
</body>
</html>
